<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitQuest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>HabitQuest</h1>

    <div class="container">
        <!-- Game Info Section -->
        <div class="section" id="game-info-section">
            <h2>Game Status</h2>
            <p>Floor: <span id="floor">1</span> / 52</p>
            <p id="monthly-theme">No theme this month.</p>
        </div>

        <!-- Hero Section -->
        <div class="section" id="hero-section">
            <h2>Hero Stats</h2>
            <p>Level: <span id="hero-level">1</span></p>
            <p>XP: <span id="hero-xp">0</span> / <span id="xp-to-next-level">100</span></p>
            <hr>
            <p>Vitality: <span id="stat-vitality">1</span></p>
            <p>Agility: <span id="stat-agility">1</span></p>
            <p>Strength: <span id="stat-strength">1</span></p>
            <p>Will Power: <span id="stat-willpower">1</span></p>
            <p>Intelligence: <span id="stat-intelligence">1</span></p>
            <hr>
            <p>Shields: <span id="hero-shields">0</span></p>
        </div>

        <!-- Habits (Quests) Section -->
        <div class="section" id="habits-section">
            <h2>Daily Quests (Habits)</h2>
            <p id="special-day-info">Today is a normal day.</p>
            <div class="habit">
                <label for="habit-vitality">Vitality (Eating):</label>
                <div class="habit-row">
                    <select id="habit-vitality">
                        <option value="0">None</option>
                        <option value="1.0">Small Win</option>
                        <option value="1.5">Mid Win</option>
                        <option value="2.0">Big Win</option>
                    </select>
                    <input type="checkbox" class="use-shield-cb" title="Use Shield">
                </div>
            </div>
            <div class="habit">
                <label for="habit-agility">Agility (Career):</label>
                 <div class="habit-row">
                    <select id="habit-agility">
                        <option value="0">None</option>
                        <option value="1.0">Small Win</option>
                        <option value="1.5">Mid Win</option>
                        <option value="2.0">Big Win</option>
                    </select>
                    <input type="checkbox" class="use-shield-cb" title="Use Shield">
                </div>
            </div>
            <div class="habit">
                <label for="habit-strength">Strength (Workout):</label>
                <div class="habit-row">
                    <select id="habit-strength">
                        <option value="0">None</option>
                        <option value="1.0">Small Win</option>
                        <option value="1.5">Mid Win</option>
                        <option value="2.0">Big Win</option>
                    </select>
                    <input type="checkbox" class="use-shield-cb" title="Use Shield">
                </div>
            </div>
            <div class="habit">
                <label for="habit-willpower">Will Power (Getup):</label>
                <div class="habit-row">
                    <select id="habit-willpower">
                        <option value="0">None</option>
                        <option value="1.0">Small Win</option>
                        <option value="1.5">Mid Win</option>
                        <option value="2.0">Big Win</option>
                    </select>
                    <input type="checkbox" class="use-shield-cb" title="Use Shield">
                </div>
            </div>
            <div class="habit">
                <label for="habit-intelligence">Intelligence (Learning):</label>
                <div class="habit-row">
                    <select id="habit-intelligence">
                        <option value="0">None</option>
                        <option value="1.0">Small Win</option>
                        <option value="1.5">Mid Win</option>
                        <option value="2.0">Big Win</option>
                    </select>
                    <input type="checkbox" class="use-shield-cb" title="Use Shield">
                </div>
            </div>
            <button id="commit-day-button">Commit Day's Work</button>
        </div>

        <!-- Boss Section -->
        <div class="section" id="boss-section">
            <h2>Current Boss</h2>
            <p>Name: <span id="boss-name">Procrastination Dragon</span></p>
            <p>HP: <span id="boss-hp">200</span></p>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
